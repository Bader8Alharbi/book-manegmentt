name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/mocha

      - name: Install Frontend and Build
        working-directory: ./frontend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Deploy with PM2
        run: |
          pm2 delete qq-frontend || true
          pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production

      - name: Save PM2 process list
        run: pm2 save

      - name: Configure Nginx
        run: |
          sudo tee /etc/nginx/sites-available/book-manager << 'CONF'
          server {
              listen 80 default_server;
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          CONF
          sudo ln -sf /etc/nginx/sites-available/book-manager /etc/nginx/sites-enabled/book-manager
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl reload nginx

      - name: Show running processes
        run: pm2 list
