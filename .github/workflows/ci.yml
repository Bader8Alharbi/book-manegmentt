name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/mocha

      - name: Install Frontend and Build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: http://bookmanager-1596291518.ap-southeast-2.elb.amazonaws.com
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Deploy with PM2
        run: |
          pm2 delete all || true
          pm2 start ecosystem.config.js --env production
          pm2 save

      - name: Configure Nginx
        run: |
          if [ -d /etc/nginx/sites-available ]; then
            sudo cp nginx.conf /etc/nginx/sites-available/book-manager
            sudo ln -sf /etc/nginx/sites-available/book-manager /etc/nginx/sites-enabled/book-manager
            sudo rm -f /etc/nginx/sites-enabled/default
          else
            sudo cp nginx.conf /etc/nginx/conf.d/book-manager.conf
          fi
          sudo nginx -t && sudo systemctl reload nginx

      - name: Mirror deploy to second server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER2: ${{ secrets.SERVER2_HOST }}
          PROD_ENV: ${{ secrets.PROD }}
        run: |
          if [ -z "$SERVER2" ] || [ -z "$SSH_KEY" ]; then
            echo "Skipping: add SERVER2_HOST and SSH_PRIVATE_KEY secrets to enable mirroring"
            exit 0
          fi
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER2"
          rsync -az --exclude '.git' --exclude 'backend/node_modules' --exclude 'frontend/node_modules' \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@$SERVER2:~/book-manager/
          $SSH "cd ~/book-manager && echo '$PROD_ENV' > backend/.env && cd backend && npm install && cd .. && pm2 delete all || true && pm2 start ecosystem.config.js --env production && pm2 save"
          $SSH "if [ -d /etc/nginx/sites-available ]; then sudo cp ~/book-manager/nginx.conf /etc/nginx/sites-available/book-manager && sudo ln -sf /etc/nginx/sites-available/book-manager /etc/nginx/sites-enabled/book-manager && sudo rm -f /etc/nginx/sites-enabled/default; else sudo cp ~/book-manager/nginx.conf /etc/nginx/conf.d/book-manager.conf; fi && sudo nginx -t && sudo systemctl reload nginx"
          rm -f /tmp/deploy_key

      - name: Show running processes
        run: pm2 list
