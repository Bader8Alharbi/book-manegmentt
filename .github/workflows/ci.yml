name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Stop existing processes
        run: pm2 stop all || true

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Install Frontend and Build
        working-directory: ./frontend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Deploy with PM2
        run: pm2 start ecosystem.config.js --env production

      - name: Save PM2 process list
        run: pm2 save

      - name: Show running processes
        run: pm2 list
