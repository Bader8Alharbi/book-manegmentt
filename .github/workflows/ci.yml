name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    strategy:
      matrix:
        include:
          - runner: self-hosted
          - runner: [self-hosted, server2]
      max-parallel: 2
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/mocha

      - name: Install Frontend and Build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: http://bookmanager-1596291518.ap-southeast-2.elb.amazonaws.com
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Deploy with PM2
        run: |
          pm2 delete all || true
          pm2 start ecosystem.config.js --env production
          pm2 save

      - name: Configure Nginx
        run: |
          if [ -d /etc/nginx/sites-available ]; then
            sudo cp nginx.conf /etc/nginx/sites-available/book-manager
            sudo ln -sf /etc/nginx/sites-available/book-manager /etc/nginx/sites-enabled/book-manager
            sudo rm -f /etc/nginx/sites-enabled/default
          else
            sudo cp nginx.conf /etc/nginx/conf.d/book-manager.conf
          fi
          sudo nginx -t && sudo systemctl reload nginx

      - name: Show running processes
        run: pm2 list
