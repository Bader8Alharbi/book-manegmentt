name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/mocha

      - name: Install Frontend and Build
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: http://13.236.71.21
        run: |
          rm -rf node_modules
          npm install
          chmod +x node_modules/.bin/react-scripts
          npm run build

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Stop all PM2 processes and redeploy
        run: |
          pm2 delete all || true
          pm2 start ecosystem.config.js --env production
          pm2 save

      - name: Configure Nginx
        run: |
          cat > /tmp/nginx-book-manager << 'CONF'
          server {
              listen 80 default_server;
              location / {
                  proxy_pass http://localhost:5001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          CONF
          if [ -d /etc/nginx/sites-available ]; then
            sudo cp /tmp/nginx-book-manager /etc/nginx/sites-available/book-manager
            sudo ln -sf /etc/nginx/sites-available/book-manager /etc/nginx/sites-enabled/book-manager
            sudo rm -f /etc/nginx/sites-enabled/default
          elif [ -d /etc/nginx/conf.d ]; then
            sudo cp /tmp/nginx-book-manager /etc/nginx/conf.d/book-manager.conf
          fi
          sudo nginx -t && sudo systemctl reload nginx

      - name: Show running processes
        run: pm2 list
